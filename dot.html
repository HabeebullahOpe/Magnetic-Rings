<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Footprint PNG Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c" width="800" height="400"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, 800, 400);

// ── Load your footprint PNG ───────────────────────────
// Drop your PNG in the same folder as this HTML file
// and name it foot.png — or change the path below
const footImg = new Image();
footImg.src = 'foot.png'; // ← your file here

footImg.onload = () => {
  // Create a white-tinted version of the footprint
  // (original is black, we want white for dark background)
  const off = document.createElement('canvas');
  off.width  = footImg.width;
  off.height = footImg.height;
  const otx  = off.getContext('2d');

  // Draw original
  otx.drawImage(footImg, 0, 0);

  // Invert: make black pixels white, keep transparency
  otx.globalCompositeOperation = 'source-in';
  otx.fillStyle = '#ffffff';
  otx.fillRect(0, 0, off.width, off.height);

  // ── drawFoot ────────────────────────────────────────
  // cx, cy  = center position
  // size    = foot length in px
  // isRight = true = right foot, false = left (mirrors)
  // angle   = rotation radians (Math.PI/2 = walking right)
  // alpha   = 0..1 opacity
  function drawFoot(cx, cy, size, isRight, angle, alpha) {
    const aspect = footImg.width / footImg.height;
    const fh = size;
    const fw = fh * aspect;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.scale(isRight ? 1 : -1, 1);
    ctx.globalAlpha = alpha;

    // glow underneath
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, fh * 0.55);
    grd.addColorStop(0,   'rgba(255,255,255,0.25)');
    grd.addColorStop(0.5, 'rgba(255,255,255,0.08)');
    grd.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.ellipse(0, 0, fw * 0.5, fh * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // stamp foot centered
    ctx.drawImage(off, -fw / 2, -fh / 2, fw, fh);

    ctx.restore();
  }

  // ────────────────────── Tests ──────────────────────

  // Upright pair
  drawFoot(180, 200, 200, true,  0, 1.0);
  drawFoot(320, 200, 200, false, 0, 1.0);

  // Walking rightward
  drawFoot(490, 185, 140, true,  Math.PI / 2, 1.0);
  drawFoot(580, 215, 140, false, Math.PI / 2, 1.0);

  // Fading old steps
  drawFoot(670, 185, 120, true,  Math.PI / 2, 0.45);
  drawFoot(745, 215, 120, false, Math.PI / 2, 0.18);
};

footImg.onerror = () => {
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '14px monospace';
  ctx.fillText('Put your foot.png in the same folder as this HTML file', 40, 200);
};
</script>
</body>
</html>
